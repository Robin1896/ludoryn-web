name: Test & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test --reporter=list,json --output=test-results 2>&1 | tee test-output.txt; echo "{\"exit\":$?}" > exit-code.json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: report.json

      - name: Take screenshots
        if: always()
        run: |
          node -e "
          const { chromium } = require('@playwright/test');
          (async () => {
            const BASE = 'https://robin1896-ludoryn-web.hf.space';
            const pages = [
              { name: '01-home', url: '/' },
              { name: '02-lobby', url: '/lobby?game=grub' },
              { name: '03-grub', url: '/grub' },
              { name: '04-flikflak', url: '/beverbende' },
              { name: '05-bommen', url: '/bommen' },
              { name: '06-carcassonne', url: '/carcassonne' },
              { name: '07-qwixx', url: '/qwixx' },
              { name: '08-scores', url: '/scores' },
            ];
            const browser = await chromium.launch();
            const ctx = await browser.newContext({ viewport: { width: 390, height: 844 } });
            require('fs').mkdirSync('screenshots', { recursive: true });
            for (const p of pages) {
              const page = await ctx.newPage();
              await page.goto(BASE + p.url, { waitUntil: 'networkidle', timeout: 20000 }).catch(() => {});
              await page.waitForTimeout(2000);
              await page.screenshot({ path: 'screenshots/' + p.name + '.png' });
              await page.close();
              console.log('screenshot: ' + p.name);
            }
            await browser.close();
          })();
          "

      - name: Publish results to test-results branch
        if: always()
        run: |
          git config user.email "gureattenberrie@gmail.com"
          git config user.name "robin1896"

          # Haal passed/failed op via jq (beschikbaar op ubuntu runners)
          PASSED=$(jq '.stats.expected // 0' report.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected // 0' report.json 2>/dev/null || echo 0)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > meta.json << METAEOF
          {
            "run": ${{ github.run_number }},
            "sha": "${{ github.sha }}",
            "timestamp": "${TS}",
            "passed": ${PASSED},
            "failed": ${FAILED}
          }
          METAEOF

          # Switch naar test-results branch (orphan zodat hij klein blijft)
          git fetch origin test-results 2>/dev/null || true
          git checkout --orphan test-results-new
          git rm -rf . --quiet 2>/dev/null || true

          cp report.json . 2>/dev/null || echo '{}' > report.json
          cp meta.json .
          cp -r screenshots . 2>/dev/null || mkdir screenshots

          git add report.json meta.json screenshots/
          git commit -m "test results: run #${{ github.run_number }}"
          git push origin test-results-new:test-results --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to HuggingFace
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "gureattenberrie@gmail.com"
          git config user.name "robin1896"
          git remote add hf "https://robin1896:${HF_TOKEN}@huggingface.co/spaces/robin1896/ludoryn-web"
          git push hf main --force
