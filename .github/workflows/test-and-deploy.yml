name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests against live HuggingFace space
        run: npx playwright test --config playwright.config.ts

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy to HuggingFace
    runs-on: ubuntu-latest
    needs: test          # alleen als tests slagen
    if: success()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "gureattenberrie@gmail.com"
          git config user.name "robin1896"
          git remote add hf "https://robin1896:${HF_TOKEN}@huggingface.co/spaces/robin1896/ludoryn-web"
          git push hf main --force
