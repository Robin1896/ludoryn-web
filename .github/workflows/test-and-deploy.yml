name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests against live HuggingFace space
        run: npx playwright test --config playwright.config.ts

      - name: Take screenshots of all pages
        if: always()
        run: |
          node -e "
          const { chromium } = require('@playwright/test');
          (async () => {
            const BASE = 'https://robin1896-ludoryn-web.hf.space';
            const pages = [
              { name: '01-home', url: '/' },
              { name: '02-lobby', url: '/lobby?game=grub' },
              { name: '03-grub', url: '/grub' },
              { name: '04-flikflak', url: '/beverbende' },
              { name: '05-bommen', url: '/bommen' },
              { name: '06-carcassonne', url: '/carcassonne' },
              { name: '07-qwixx', url: '/qwixx' },
              { name: '08-scores', url: '/scores' },
            ];
            const browser = await chromium.launch();
            const ctx = await browser.newContext({ viewport: { width: 390, height: 844 } });
            require('fs').mkdirSync('screenshots', { recursive: true });
            for (const p of pages) {
              const page = await ctx.newPage();
              await page.goto(BASE + p.url, { waitUntil: 'networkidle', timeout: 20000 }).catch(() => {});
              await page.waitForTimeout(2000);
              await page.screenshot({ path: \`screenshots/\${p.name}.png\` });
              await page.close();
            }
            await browser.close();
          })();
          "

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy to HuggingFace
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "gureattenberrie@gmail.com"
          git config user.name "robin1896"
          git remote add hf "https://robin1896:${HF_TOKEN}@huggingface.co/spaces/robin1896/ludoryn-web"
          git push hf main --force
